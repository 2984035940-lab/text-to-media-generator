version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - RUNWAY_API_KEY=${RUNWAY_API_KEY}
      - LEONARDO_API_KEY=${LEONARDO_API_KEY}
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
      - ./output:/app/output
    command: python backend/app.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

networks:
  default:
    name: text-to-media-network

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文案转视频/图像生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .results h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .result-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 10px;
        }

        .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .input-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 AI 内容生成器</h1>
            <p class="subtitle">使用 Runway 和 Leonardo 将文案转换为视频和图像</p>
        </header>

        <div class="main-content">
            <!-- Video Generation Card -->
            <div class="card">
                <h2><span class="icon">🎥</span>生成视频</h2>
                <form id="videoForm">
                    <div class="form-group">
                        <label for="videoPrompt">视频描述 *</label>
                        <textarea id="videoPrompt" placeholder="描述你想要生成的视频..." required></textarea>
                    </div>
                    <div class="input-row">
                        <div class="form-group">
                            <label for="videoDuration">时长（秒）</label>
                            <input type="number" id="videoDuration" value="5" min="1" max="60">
                        </div>
                        <div class="form-group">
                            <label for="videoFPS">帧率（FPS）</label>
                            <input type="number" id="videoFPS" value="24" min="1" max="60">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="form-group">
                            <label for="videoWidth">宽度（像素）</label>
                            <input type="number" id="videoWidth" value="1280" min="256" max="2048" step="256">
                        </div>
                        <div class="form-group">
                            <label for="videoHeight">高度（像素）</label>
                            <input type="number" id="videoHeight" value="720" min="256" max="2048" step="256">
                        </div>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-primary">生成视频</button>
                        <button type="reset" class="btn-secondary">清空</button>
                    </div>
                </form>
                <div id="videoStatus"></div>
            </div>

            <!-- Image Generation Card -->
            <div class="card">
                <h2><span class="icon">🖼️</span>生成图像</h2>
                <form id="imageForm">
                    <div class="form-group">
                        <label for="imagePrompt">图像描述 *</label>
                        <textarea id="imagePrompt" placeholder="描述你想要生成的图像..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="negativePrompt">反向提示词</label>
                        <input type="text" id="negativePrompt" placeholder="输入你不想要的元素...">
                    </div>
                    <div class="input-row">
                        <div class="form-group">
                            <label for="numImages">生成数量</label>
                            <input type="number" id="numImages" value="1" min="1" max="4">
                        </div>
                        <div class="form-group">
                            <label for="guidance">引导强度</label>
                            <input type="number" id="guidance" value="7.5" min="1" max="20" step="0.5">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="form-group">
                            <label for="imageWidth">宽度（像素）</label>
                            <input type="number" id="imageWidth" value="768" min="256" max="2048" step="256">
                        </div>
                        <div class="form-group">
                            <label for="imageHeight">高度（像素）</label>
                            <input type="number" id="imageHeight" value="768" min="256" max="2048" step="256">
                        </div>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-primary">生成图像</button>
                        <button type="reset" class="btn-secondary">清空</button>
                    </div>
                </form>
                <div id="imageStatus"></div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results">
            <h3>📊 生成历史</h3>
            <div id="resultsList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无生成记录</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
